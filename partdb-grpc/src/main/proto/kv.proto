syntax = "proto3";

package io.partdb.grpc.kv;

option java_package = "io.partdb.grpc.kv.proto";
option java_outer_classname = "KvProto";
option java_multiple_files = false;

service KvService {
  rpc Get(GetRequest) returns (GetResponse);
  rpc Put(PutRequest) returns (PutResponse);
  rpc Delete(DeleteRequest) returns (DeleteResponse);
  rpc Scan(ScanRequest) returns (stream ScanResponse);
  rpc BatchWrite(BatchWriteRequest) returns (BatchWriteResponse);
}

message RequestHeader {
  string request_id = 1;
  int64 timeout_ms = 2;
}

enum ReadConsistency {
  LINEARIZABLE = 0;
  STALE = 1;
}

enum ErrorCode {
  OK = 0;
  NOT_FOUND = 1;
  NOT_LEADER = 2;
  INTERNAL_ERROR = 3;
}

message Error {
  ErrorCode code = 1;
  string message = 2;
  string leader_hint = 3;
}

message GetRequest {
  RequestHeader header = 1;
  bytes key = 2;
  ReadConsistency consistency = 3;
}

message GetResponse {
  Error error = 1;
  bytes value = 2;
  int64 revision = 3;
}

message PutRequest {
  RequestHeader header = 1;
  bytes key = 2;
  bytes value = 3;
}

message PutResponse {
  Error error = 1;
  int64 revision = 2;
}

message DeleteRequest {
  RequestHeader header = 1;
  bytes key = 2;
}

message DeleteResponse {
  Error error = 1;
  int64 revision = 2;
}

message ScanRequest {
  RequestHeader header = 1;
  bytes start_key = 2;
  bytes end_key = 3;
  int32 limit = 4;
  ReadConsistency consistency = 5;
}

message ScanResponse {
  Error error = 1;
  bytes key = 2;
  bytes value = 3;
  int64 revision = 4;
}

message WriteOp {
  oneof op {
    PutOp put = 1;
    DeleteOp delete = 2;
  }
}

message PutOp {
  bytes key = 1;
  bytes value = 2;
}

message DeleteOp {
  bytes key = 1;
}

message BatchWriteRequest {
  RequestHeader header = 1;
  repeated WriteOp ops = 2;
}

message BatchWriteResponse {
  Error error = 1;
  int64 revision = 2;
}
